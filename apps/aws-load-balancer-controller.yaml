apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-load-balancer-controller
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "0" }
spec:
  project: default
  source:
    repoURL: https://aws.github.io/eks-charts
    chart: aws-load-balancer-controller
    targetRevision: "3.4.2"
    helm:
      releaseName: aws-load-balancer-controller
      values: |
        clusterName: eks-substrate
        region: us-east-2
        # ACCOUNT-SPECIFIC. Must match `terraform -chdir=substrate output -raw vpc_id`.
        # If the cluster is ever rebuilt, this MUST be updated -- the controller
        # silently evaluates 0 subnets and the Service sits at <pending> forever
        # with "unable to resolve at least one subnet" in its events.
        vpcId: vpc-0a46baf000aa1bd0f
        enableServiceMutatorWebhook: false
        serviceAccount:
          create: true
          name: aws-load-balancer-controller
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::048751351548:role/aws-load-balancer-controller
  destination: { server: https://kubernetes.default.svc, namespace: kube-system }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
