apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: draw-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/patrickdwyer33/platform-gitops.git
    targetRevision: main
    path: workloads/draw/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
