apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prod
# NO nameSuffix: the ServiceAccount must stay `draw` so its IRSA subject is
# system:serviceaccount:prod:draw, matching the draw-objects role trust policy.
# (See the dev overlay for the full rationale.)
resources:
  - ../../base
  - ingress.yaml
patches:
  - target: { kind: Deployment, name: draw }
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value: { name: OBJECTS_BUCKET, value: objects.patrickdwyer.com }
images:
  - name: draw
    newName: 048751351548.dkr.ecr.us-east-2.amazonaws.com/draw
    newTag: "03311ac"
