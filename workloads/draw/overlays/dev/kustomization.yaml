apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev
# NO nameSuffix (unlike the static sites): the ServiceAccount MUST stay named
# `draw` so its IRSA token subject is system:serviceaccount:dev:draw, matching the
# draw-objects role trust policy. A `-dev` suffix would rename the SA to draw-dev,
# break the subject match, and the pod would get no AWS creds. Namespaces already
# separate dev/prod, so the suffix is redundant here anyway.
resources:
  - ../../base
  - ingress.yaml
patches:
  - target: { kind: Deployment, name: draw }
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value: { name: OBJECTS_BUCKET, value: objects-dev.patrickdwyer.com }
images:
  - name: draw
    newName: 048751351548.dkr.ecr.us-east-2.amazonaws.com/draw
    newTag: "1f33959"
